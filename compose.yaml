x-common-env: &common-env
  ENVIRONMENT: ${ENVIRONMENT}
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  MEILI_URL: ${MEILI_URL}
  MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
  MEILI_SEARCH_KEY: ${MEILI_SEARCH_KEY}
  SECRET_KEY: ${SECRET_KEY}
  MALWAREBAZAAR_API_KEY: ${MALWAREBAZAAR_API_KEY}
  ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET}
  ONLYOFFICE_FILE_TOKEN_SECRET: ${ONLYOFFICE_FILE_TOKEN_SECRET}

x-worker-base: &worker-base
  restart: unless-stopped
  entrypoint: ["./worker-start.sh"]
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - backend
  security_opt:
    - seccomp:unconfined
    - apparmor:unconfined
  cap_add:
    - SYS_ADMIN
  healthcheck:
    test: ["CMD", "python", "-c", "import os,sys; sys.exit(0 if any(b'arq' in open(f'/proc/{p}/cmdline','rb').read() for p in os.listdir('/proc') if p.isdigit()) else 1)"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 20s

services:
  postgres:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    volumes:
      - redis_data:/data
      - ./infra/docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  meilisearch:
    restart: unless-stopped
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_LOG_LEVEL: warn
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - backend

  api:
    restart: unless-stopped
    environment:
      <<: *common-env
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - wikint_backups:/var/lib/wikint
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - frontend
      - backend

  worker:
    <<: *worker-base
    stop_grace_period: 30s
    environment: *common-env

  worker-fast:
    <<: *worker-base
    stop_grace_period: 30s
    environment: *common-env

  worker-slow:
    <<: *worker-base
    stop_grace_period: 1m
    environment: *common-env

  web:
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_ONLYOFFICE_URL=${NEXT_PUBLIC_ONLYOFFICE_URL}
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s
    networks:
      - frontend

  onlyoffice:
    image: ghcr.io/euro-office/documentserver:latest
    container_name: wikint-onlyoffice-1
    restart: unless-stopped
    stop_grace_period: 1m
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET:?ONLYOFFICE_JWT_SECRET must be set (see .env.example)}
      - JWT_IN_BODY=true
      - ALLOW_PRIVATE_IP_ADDRESS=true
    networks:
      - frontend
    extra_hosts:
      - "localhost:host-gateway"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - eurooffice_log:/var/log/onlyoffice
    deploy:
      resources:
        limits:
          memory: 4G

  nginx:
    restart: unless-stopped
    image: nginx:alpine
    volumes:
      - ./infra/nginx/error-expired.html:/etc/nginx/html/error-expired.html:ro
    depends_on:
      - api
      - web
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - frontend
      - backend

networks:
  frontend:
  backend:

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  onlyoffice_data:
  onlyoffice_log:
  eurooffice_log:
  wikint_backups:
