worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 100m;

    # Per-location CSP via map.
    # NOTE: If enabling ONLYOFFICE (include nginx.onlyoffice.snippet), add
    # 'unsafe-eval' to the default script-src below — the OO api.js script
    # runs in the parent page context and requires it.
    map $uri $csp_value {
        ~^/api/       "default-src 'none'; frame-ancestors 'none'";
        ~^/onlyoffice/ "";
        ~^/doc/       "";
        ~^/(cache|web-apps|sdkjs|sdkjs-plugins|fonts|dictionaries|meta|printfile)/ "";
        default       "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://unpkg.com; worker-src 'self' blob: https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' wss: blob: https://unpkg.com https://files.wikint.hypnos2026.fr https://*.r2.cloudflarestorage.com http://$host; media-src 'self' blob: https://files.wikint.hypnos2026.fr; frame-src 'self' https://www.youtube.com https://player.vimeo.com;";
    }

    # Docker embedded DNS — needed because $onlyoffice_upstream is resolved
    # at request time (variable in proxy_pass), not at startup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream api {
        server api:8000;
    }

    upstream web {
        server web:3000;
    }

    server {
        listen 80;
        server_name _;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $csp_value always;

        # ONLYOFFICE Document Server proxy
        include /etc/nginx/nginx.onlyoffice.snippet;

        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Forward the protocol provided by the outer proxy
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            # Keep connections open for SSE (text/event-stream)
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_read_timeout 300s;
            proxy_buffering off;
            proxy_cache off;
        }

        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # File storage is served directly from Cloudflare R2 via presigned URLs.
        # No /s3/ proxy needed in production.
    }
}