TCPSocket 3310
TCPAddr 0.0.0.0
LocalSocket /tmp/clamd.socket
# Must be >= MAX_FILE_SIZE_MB in .env (default 100 MiB = 104857600)
MaxFileSize 104857600
MaxScanSize 104857600
StreamMaxLength 104857600

# Zip-bomb & DoS Protection
MaxRecursion 16
MaxFiles 10000
AlertExceedsMax yes

LogTime yes
LogSyslog no
DatabaseDirectory /var/lib/clamav
