services:
  postgres:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  redis:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  meilisearch:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  api:
    image: ghcr.io/theo-darvoux/wikint/api:latest
    command: uv run --no-sync --no-dev gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000
    environment:
      - ENVIRONMENT=production
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  worker:
    image: ghcr.io/theo-darvoux/wikint/api:latest
    command: uv run --no-sync --no-dev arq app.workers.settings.WorkerSettings
    environment:
      - ENVIRONMENT=production
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  worker-fast:
    image: ghcr.io/theo-darvoux/wikint/api:latest
    command: uv run --no-sync --no-dev arq app.workers.settings.UploadFastWorkerSettings
    environment:
      - ENVIRONMENT=production
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  worker-slow:
    image: ghcr.io/theo-darvoux/wikint/api:latest
    command: uv run --no-sync --no-dev arq app.workers.settings.UploadSlowWorkerSettings
    environment:
      - ENVIRONMENT=production
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M

  web:
    image: ghcr.io/theo-darvoux/wikint/web:latest
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  nginx:
    ports:
      - "127.0.0.1:9080:80"
    environment:
      - S3_PUBLIC_DOMAIN=${S3_PUBLIC_DOMAIN:-files.wikint.hypnos2026.fr}
    command: >
      /bin/sh -c "envsubst '$$S3_PUBLIC_DOMAIN'
      < /etc/nginx/templates/nginx.conf.template
      > /tmp/nginx.conf
      && exec nginx -c /tmp/nginx.conf -g 'daemon off;'"
    volumes:
      - ./infra/nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./infra/nginx/nginx.onlyoffice.snippet:/etc/nginx/nginx.onlyoffice.snippet:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
