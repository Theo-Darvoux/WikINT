services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - .env
    command: >
      sh -c "rm -rf .venv && uv sync --frozen --no-dev && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - .env
    command: >
      sh -c "rm -rf .venv && uv sync --frozen --no-dev && uv run arq app.workers.settings.WorkerSettings"
    volumes:
      - ./api:/app

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: deps
    command: sh -c "CI=true pnpm install && pnpm dev"
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    profiles: []
    command: >
      sh -c "apk add --no-cache openssl &&
             mkdir -p /etc/nginx/ssl &&
             openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/nginx/ssl/nginx.key -out /etc/nginx/ssl/nginx.crt -subj '/CN=localhost' &&
             nginx -g 'daemon off;'"
    volumes:
      - ./infra/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
