services:
  # MinIO for local S3-compatible storage (production uses Cloudflare R2).
  minio:
    restart: unless-stopped
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          cpus: "0.25"
          memory: 256M

  minio-setup:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    volumes:
      - ./infra/docker/minio/setup.sh:/setup.sh
    command: /setup.sh
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}

  api:
    restart: unless-stopped
    networks:
      - default
      - frontend
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./api:/app
      - /app/.venv
    ports:
      - "8000:8000"
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    restart: unless-stopped
    build:
      context: ./api
      dockerfile: Dockerfile
    entrypoint: ["./worker-start.sh"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "uv run arq app.workers.settings.WorkerSettings"
    volumes:
      - ./api:/app
      - /app/.venv

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: deps
    restart: unless-stopped
    command: sh -c "CI=true pnpm install && pnpm dev"
    environment:
      # Route browser API calls through nginx (port 80) so SSE works correctly.
      # Next.js dev-server rewrites buffer streaming responses and break SSE.
      - NEXT_PUBLIC_API_URL=http://localhost/api
      # ONLYOFFICE Document Server URL (browser-facing, routed through nginx)
      - NEXT_PUBLIC_ONLYOFFICE_URL=http://localhost/onlyoffice
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "3000:3000"

  # ONLYOFFICE Document Server — high-fidelity office file viewer (DOCX, XLSX, PPTX, etc.)
  # Requires ~1-2 GB RAM. Takes 30-60s to initialize on first start.
  # See docs/infrastructure/onlyoffice.md for details.
  onlyoffice:
    image: onlyoffice/documentserver:8.3.0
    restart: unless-stopped
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET:?ONLYOFFICE_JWT_SECRET must be set (see .env.example)}
      - JWT_IN_BODY=true
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - ALLOW_META_IP_ADDRESS=true
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_log:/var/log/onlyoffice
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # Nginx handles CORS in Docker dev (strips backend headers, injects its own).
  # FastAPI's CORSMiddleware is authoritative in production and bare-uvicorn local dev.
  nginx:
    restart: unless-stopped
    image: nginx:alpine
    profiles: []
    networks:
      - default
      - frontend
    ports:
      - "80:80"
    depends_on:
      - api
      - web
    environment:
      - CORS_ALLOWED_HEADERS=${CORS_ALLOWED_HEADERS:-Content-Type,Authorization,X-Client-ID,Accept,X-Requested-With}
    # Bypass the nginx entrypoint's envsubst which fails on read-only overlay filesystems.
    # Run envsubst manually into /tmp (always writable) and start nginx from there.
    # Pass '$$CORS_ALLOWED_HEADERS' explicitly so only that variable is substituted —
    # nginx variables like $host, $request_method, etc. are left intact.
    entrypoint: []
    command: >
      /bin/sh -c "envsubst '$$CORS_ALLOWED_HEADERS'
      < /etc/nginx/templates/nginx.conf.template
      > /tmp/nginx.conf
      && exec nginx -c /tmp/nginx.conf -g 'daemon off;'"
    volumes:
      - ./infra/nginx/nginx.dev.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./infra/nginx/error-expired.html:/etc/nginx/html/error-expired.html:ro

networks:
  frontend:

volumes:
  minio_data:
  onlyoffice_data:
  onlyoffice_log:
